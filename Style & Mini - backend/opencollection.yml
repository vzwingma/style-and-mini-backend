opencollection: 1.0.0

info:
  name: Style & Mini - backend
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: basic
    username: "{{auth_login}}"
    password: "{{auth_pwd}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
